<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FPS Arena</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="./src/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Rajdhani:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- Floating character preview (right side, visible only on start screen) -->
    <div id="character-preview-float"></div>

    <!-- Start screen -->
    <div id="start-screen">
      <div class="start-card">
        <!-- Form body -->
        <div class="kirby-body">
          <div class="kirby-section-header teal">
            <span class="kirby-section-title">CONFIGURAR PERSONAGEM</span>
          </div>
          <div class="start-form">
            <div class="kirby-row">
              <label for="name-input">NOME</label>
              <input
                id="name-input"
                type="text"
                placeholder="Digite seu nome..."
                maxlength="16"
                autocomplete="off"
                spellcheck="false"
              />
            </div>
            <div class="kirby-row alt face-upload-row">
              <label>FOTO DO ROSTO</label>
              <div class="face-upload-controls">
                <img
                  id="face-preview-thumb"
                  class="face-preview-thumb"
                  style="display: none"
                  alt="face preview"
                />
                <button id="face-upload-btn" type="button">
                  📷 Adicionar foto
                </button>
                <button
                  id="face-remove-btn"
                  type="button"
                  style="display: none"
                >
                  ✕
                </button>
                <input
                  id="face-file-input"
                  type="file"
                  accept="image/*"
                  style="display: none"
                />
              </div>
            </div>
            <div class="kirby-row alt color-picker-row">
              <label>COR DO PERSONAGEM</label>
              <div class="color-picker-controls">
                <input id="player-color-picker" type="color" value="#4a90e2" />
                <span id="player-color-label">#4a90e2</span>
              </div>
            </div>
            <button id="play-btn">▶ ENTRAR</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Death screen -->
    <div id="death-screen">
      <div class="modal-card death-card">
        <div class="modal-icon">☠️</div>
        <div class="modal-title">Você Morreu!</div>
        <div id="death-killer-row" style="display: none">
          <img id="death-killer-face" alt="" />
          <span id="death-killer-label"
            >por <strong id="death-killer-name"></strong
          ></span>
        </div>
        <p class="modal-sub">Renascendo em breve...</p>
      </div>
    </div>

    <!-- TAB scoreboard -->
    <div id="scoreboard">
      <div id="scoreboard-header">
        <span id="scoreboard-title">PLACAR</span>
      </div>
      <table>
        <thead>
          <tr>
            <th>Jogador</th>
            <th>Kills</th>
            <th>Assists</th>
            <th>Deaths</th>
            <th>K/D</th>
          </tr>
        </thead>
        <tbody id="scoreboard-body"></tbody>
      </table>
    </div>

    <div id="crosshair"></div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
